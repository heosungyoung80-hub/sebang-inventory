<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEBANG 저장품 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --brand-green: #1f7a3d; --brand-green-soft: #d8f4df; }
        .green-bg { background-color: var(--brand-green); }
        .green-text { color: var(--brand-green); }
        .tab-btn { font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; color: #4f6d57; white-space: nowrap; flex: 1 1 0; text-align: center; padding: 10px 4px; font-size: 12px; }
        .tab-btn.active { border-bottom: 3px solid var(--brand-green); color: var(--brand-green); }
        @media (min-width: 480px) { .tab-btn { font-size: 14px; padding: 12px 8px; } }
        @media (min-width: 768px) { .tab-btn { font-size: 16px; padding: 12px 24px; } }
        .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 10px; color: white; font-weight: bold; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 9999; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 90%; max-w: 400px; text-align: center; }
        .toast.show { opacity: 1; }
        .toast.success { background: var(--brand-green); }
        .toast.error { background: #d32f2f; }
        /* 모바일 스크롤바 숨김 처리 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        /* QR 라벨 인쇄 전용 스타일 */
        #printArea { display: none; }
        .qr-label { width: 180px; padding: 8px; border: 1px dashed #999; text-align: center; display: inline-flex; flex-direction: column; align-items: center; break-inside: avoid; margin: 4px; }
        .qr-label .part-id { font-weight: bold; font-size: 13px; margin-top: 4px; }
        .qr-label .part-name { font-size: 10px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; }
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { display: flex; flex-wrap: wrap; position: absolute; top: 0; left: 0; width: 100%; }
        }
    </style>
</head>
<body class="bg-[#f9fbf8]">
    <div class="max-w-6xl mx-auto p-4 mb-24">
        <!-- 헤더 -->
        <div class="green-bg p-4 md:p-6 rounded-t-2xl text-white shadow-lg flex justify-between items-center">

                <h1 class="text-3xl md:text-3xl font-bold truncate">저장품 관리</h1>
            </div>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
            <div class="flex items-center gap-2 flex-shrink-0">
                <button onclick="openDataModal()" class="text-xs md:text-sm bg-white/20 hover:bg-white/30 px-3 py-3 rounded-lg">📁 데이터</button>
                <button onclick="loadDashboard()" class="text-xs md:text-sm bg-white/20 hover:bg-white/30 px-4 py-3 rounded-lg">🔄 새로고침</button>
            </div>
        </div>

        <!-- 통합 탭 (가로 스크롤 적용) -->
        <div class="bg-white flex border-b border-gray-200 overflow-x-auto scrollbar-hide">
            <button class="tab-btn active" onclick="showTab('dashboard', event)">대시보드 현황</button>
            <button class="tab-btn" onclick="showTab('scan', event)">QR 스캔/입출고</button>
            <button class="tab-btn" onclick="showTab('logs', event)">최근 입출고 현황</button>
        </div>

        <!-- 1. 대시보드 탭 -->
        <div id="dashboard" class="tab-content bg-white p-4 md:p-6 shadow-sm">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-6">
                <div class="p-4 bg-white border border-[#d1e7d6] rounded-xl shadow-sm">
                    <p class="text-[10px] font-bold text-[#4f6d57] uppercase">전체 재고 금액</p>
                    <p id="kpi-total-value" class="text-lg md:text-xl font-bold text-[var(--brand-green)] truncate">₩ 0</p>
                </div>
                <div onclick="openLowStockModal()" class="p-4 bg-white border border-[#d1e7d6] rounded-xl shadow-sm cursor-pointer hover:border-red-300 transition">
                    <p class="text-[10px] font-bold text-[#4f6d57] uppercase">안전재고 부족</p>
                    <p id="kpi-low-stock" class="text-lg md:text-xl font-bold text-red-600">0건</p>
                </div>
                <div class="p-4 bg-white border border-[#d1e7d6] rounded-xl shadow-sm">
                    <p class="text-[10px] font-bold text-[#4f6d57] uppercase">기종별 합계</p>
                    <p id="kpi-top-category" class="text-sm md:text-lg font-bold text-[#1f7a3d] leading-tight truncate">-</p>
                </div>
                <div onclick="openLongStockModal()" class="p-4 bg-white border border-[#d1e7d6] rounded-xl shadow-sm cursor-pointer hover:border-orange-300 transition">
                    <p class="text-[10px] font-bold text-[#4f6d57] uppercase">장기 재고(1년↑)</p>
                    <p id="kpi-long-stock" class="text-lg md:text-xl font-bold text-orange-600">0건</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-5 gap-6">
                <div class="md:col-span-2 border border-gray-200 rounded-xl p-4">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-sm font-bold text-[#1f7a3d]">기종별 재고 자산 분포</h3>
                        <div class="flex gap-2">
                            <button onclick="selectAllCategories()" class="text-[11px] font-bold text-white bg-[#1f7a3d] px-2 py-1.5 rounded-lg">전체 선택</button>
                            <button onclick="clearAllCategories()" class="text-[11px] font-bold text-white bg-gray-500 px-2 py-1.5 rounded-lg">전체 해제</button>
                        </div>
                    </div>
                    <div id="chart-type" class="relative w-full h-[250px] md:h-[350px] bg-gray-50 rounded-lg overflow-hidden">
                        <div class="w-full h-full flex items-center justify-center text-xs text-gray-400">데이터 로딩 중...</div>
                    </div>
                </div>
                <div class="md:col-span-3 border border-gray-200 rounded-xl p-4">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-sm font-bold text-[#1f7a3d]">품목 리스트</h3>
                        <div class="flex gap-2">
                            <button onclick="printAllQrLabels()" class="text-[11px] font-bold text-white bg-gray-600 px-3 py-2 rounded-lg">🖨️ QR 전체 인쇄</button>
                            <button id="category-list-toggle-all" onclick="toggleShowAllItems()" class="text-[11px] font-bold text-white bg-[#1f7a3d] px-3 py-2 rounded-lg">전체 보기</button>
                        </div>
                    </div>
                    <!-- 실시간 검색창 -->
                    <div class="mb-3">
                        <input type="text" id="searchInput" oninput="renderCategoryListPanel()" placeholder="🔍 품번 또는 품명 검색..." class="w-full p-3 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:bg-white focus:border-[#1f7a3d] outline-none">
                    </div>
                    <div id="category-list-empty" class="h-[250px] md:h-[350px] flex items-center justify-center text-xs text-gray-400 text-center px-4">
                        기종을 선택하거나 검색어를 입력하세요.
                    </div>
                    <div class="overflow-y-auto overflow-x-auto w-full h-[250px] md:h-[350px] hidden scrollbar-hide" id="category-list-wrap">
                        <table class="w-full text-xs text-left whitespace-nowrap min-w-[500px]">
                            <thead class="bg-gray-50 sticky top-0 z-10"><tr><th class="p-2">품번</th><th class="p-2">품명</th><th class="p-2">기종</th><th class="p-2">현재고</th><th class="p-2">금액</th><th class="p-2">QR</th></tr></thead>
                            <tbody id="category-list-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. QR/입출고 탭 -->
        <div id="scan" class="tab-content hidden bg-white p-4 md:p-6 pb-28">
            <div id="reader" class="w-full max-w-sm mx-auto border-2 border-dashed border-[#1f7a3d] rounded-xl overflow-hidden bg-gray-50"></div>
            <div class="mt-6 space-y-4 max-w-sm mx-auto">
                <input type="text" id="partId" placeholder="품번/렉번호 입력 (터치하여 입력)" oninput="updateScanItemInfo()" class="w-full p-4 border border-gray-300 rounded-lg text-lg bg-gray-50 focus:bg-white focus:border-[#1f7a3d] outline-none">
                <div id="scanItemInfo" class="hidden -mt-2 p-3 rounded-lg text-sm"></div>
                <input type="number" id="qty" inputmode="numeric" pattern="[0-9]*" placeholder="수량 입력" class="w-full p-4 border border-gray-300 rounded-lg text-xl font-bold text-center bg-gray-50 focus:bg-white focus:border-[#1f7a3d] outline-none">
            </div>
            
            <!-- 하단 고정 입출고 버튼 -->
            <div id="action-buttons" class="fixed bottom-0 left-0 w-full bg-white p-4 border-t border-gray-200 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.1)] z-40 flex gap-3 hidden">
                <button id="btn-in" onclick="submitData('입고')" class="flex-1 green-bg text-white py-4 rounded-xl font-bold text-xl shadow-lg active:scale-95 transition-transform disabled:opacity-60">입고</button>
                <button id="btn-out" onclick="submitData('출고')" class="flex-1 bg-[#d32f2f] text-white py-4 rounded-xl font-bold text-xl shadow-lg active:scale-95 transition-transform disabled:opacity-60">출고</button>
            </div>
        </div>

        <!-- 3. 최근 입출고 현황 탭 -->
        <div id="logs" class="tab-content hidden bg-white p-4 md:p-6">
            <div id="recentLogsList" class="divide-y divide-gray-100"></div>
            <button id="recentLogsMoreBtn" onclick="showMoreRecentLogs()" class="hidden w-full mt-4 bg-[#f2f9f4] border border-[#d1e7d6] text-[#1f7a3d] font-bold text-sm py-3 rounded-xl">+ 20개 더 보기</button>
        </div>

    </div>

    <!-- 데이터 관리 모달 -->
    <div id="dataModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onclick="closeDataModal(event)">
        <div class="bg-white rounded-2xl max-w-lg w-full h-[85vh] shadow-2xl flex flex-col" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center p-4 border-b border-gray-100 flex-shrink-0">
                <h3 class="text-base font-bold text-[#1f7a3d]">📁 데이터 관리</h3>
                <button onclick="closeDataModal()" class="text-gray-500 hover:text-gray-800 text-3xl leading-none p-2">&times;</button>
            </div>
            <div class="overflow-y-auto p-4 flex-1 scrollbar-hide">
                <!-- CSV 업로드/다운로드 -->
                <div class="border-2 border-dashed border-gray-300 p-5 text-center rounded-xl bg-gray-50 flex flex-col items-center">
                    <input type="file" id="csvFile" accept=".csv" class="mb-4 max-w-full text-xs">
                    <div class="flex flex-col w-full gap-2">
                        <button onclick="uploadCsv()" class="bg-[#1f7a3d] text-white w-full py-3 rounded-xl font-bold text-sm shadow-md">CSV 업로드 (미리보기)</button>
                        <button onclick="downloadCsv()" class="bg-gray-600 text-white w-full py-3 rounded-xl font-bold text-sm shadow-md">전체 리스트 다운로드</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 안전재고 부족 모달 -->
    <div id="lowStockModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onclick="closeLowStockModal(event)">
        <div class="bg-white rounded-2xl max-w-4xl w-full h-[80vh] shadow-2xl flex flex-col" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center p-4 border-b border-gray-100 flex-shrink-0">
                <h3 class="text-base font-bold text-red-600">⚠️ 안전재고 부족 현황</h3>
                <button onclick="closeLowStockModal()" class="text-gray-500 hover:text-gray-800 text-3xl p-2">&times;</button>
            </div>
            <div class="overflow-y-auto overflow-x-auto p-4 flex-1 scrollbar-hide">
                <table class="w-full text-xs text-left whitespace-nowrap min-w-[600px]">
                    <thead class="bg-gray-50 sticky top-0 z-10">
                        <tr><th class="p-2">품번</th><th class="p-2">품명</th><th class="p-2">기종</th><th class="p-2">현재고</th><th class="p-2">안전재고</th><th class="p-2">부족</th></tr>
                    </thead>
                    <tbody id="lowStockModalBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 장기재고 모달 -->
    <div id="longStockModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onclick="closeLongStockModal(event)">
        <div class="bg-white rounded-2xl max-w-4xl w-full h-[80vh] shadow-2xl flex flex-col" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center p-4 border-b border-gray-100 flex-shrink-0">
                <h3 class="text-base font-bold text-orange-600">🕒 장기재고(1년이상) 현황</h3>
                <button onclick="closeLongStockModal()" class="text-gray-500 hover:text-gray-800 text-3xl p-2">&times;</button>
            </div>
            <div class="overflow-y-auto overflow-x-auto p-4 flex-1 scrollbar-hide">
                <table class="w-full text-xs text-left whitespace-nowrap min-w-[600px]">
                    <thead class="bg-gray-50 sticky top-0 z-10">
                        <tr><th class="p-2">품번</th><th class="p-2">품명</th><th class="p-2">현재고</th><th class="p-2">단가</th><th class="p-2">재고일수</th></tr>
                    </thead>
                    <tbody id="longStockModalBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 품목 상세 모달 -->
    <div id="itemDetailModal" class="hidden fixed inset-0 bg-black/60 flex items-end md:items-center justify-center z-50 md:p-4 transition-all" onclick="closeItemDetailModal(event)">
        <div class="bg-white rounded-t-3xl md:rounded-2xl w-full max-w-2xl max-h-[85vh] shadow-2xl flex flex-col" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center p-5 border-b border-gray-100 flex-shrink-0">
                <h3 class="text-lg font-bold text-[#1f7a3d]">📦 품목 상세 정보</h3>
                <button onclick="closeItemDetailModal()" class="text-gray-500 hover:text-gray-800 text-3xl">&times;</button>
            </div>
            <div class="overflow-y-auto p-5 pt-4 flex-1" id="itemDetailBody"></div>
        </div>
    </div>

    <!-- QR 라벨 모달 -->
    <div id="qrLabelModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onclick="closeQrLabelModal(event)">
        <div class="bg-white rounded-2xl max-w-xs w-full shadow-2xl flex flex-col p-5" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-base font-bold text-[#1f7a3d]">📎 QR 라벨</h3>
                <button onclick="closeQrLabelModal()" class="text-gray-500 hover:text-gray-800 text-3xl leading-none">&times;</button>
            </div>
            <div class="flex flex-col items-center">
                <div id="qrLabelCanvasWrap" class="bg-white p-2"></div>
                <p id="qrLabelPartId" class="font-bold text-lg mt-2"></p>
                <p id="qrLabelPartName" class="text-xs text-gray-500 mb-4"></p>
            </div>
            <button onclick="printSingleQrLabel()" class="green-bg text-white w-full py-3 rounded-xl font-bold">🖨️ 이 라벨 인쇄</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="printArea"></div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxU7ZA41jrFuADm5Q3eXlsGjFKguiY8DJYE_pPwwQWCsq0YMdEO2wNkjLHN0OJ3pdFG/exec";

        let masterData = [];
        let categoryChart = null;
        let lowStockItemsGlobal = [];
        let longStockItemsGlobal = [];
        let categoryValueMap = {};
        let categoryQtyMap = {};
        let selectedCategories = new Set();
        let showAllItems = false;
        
        let html5QrCode = null;
        let isCameraScanning = false;

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showTab(tabId, evt) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            evt.target.classList.add('active');

            const actionButtons = document.getElementById('action-buttons');
            
            if (tabId === 'scan') {
                actionButtons.classList.remove('hidden');

        function formatMillion(value) {
            return (value / 1000000).toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + '백만';

        function squarify(items, x, y, w, h) {
            const result = [];
            let remaining = items.slice();
            function worstRatio(row, side) {
                const sum = row.reduce((s, it) => s + it.area, 0);
                const max = Math.max(...row.map(it => it.area));
                const min = Math.min(...row.map(it => it.area));
                return Math.max((side * side * max) / (sum * sum), (sum * sum) / (side * side * min));
            }
            while (remaining.length > 0) {
                const shortSide = Math.min(w, h);
                let row = [remaining[0]];
                let bestRatio = worstRatio(row, shortSide);
                let i = 1;
                while (i < remaining.length) {
                    const testRow = row.concat([remaining[i]]);
                    const testRatio = worstRatio(testRow, shortSide);
                    if (testRatio <= bestRatio) { row = testRow; bestRatio = testRatio; i++; } 
                    else break;
                }
                const rowArea = row.reduce((s, it) => s + it.area, 0);
                if (w >= h) {
                    const rowWidth = rowArea / h;
                    let curY = y;
                    row.forEach(it => {
                        const itHeight = it.area / rowWidth;
                        result.push({ ...it, x, y: curY, w: rowWidth, h: itHeight });
                        curY += itHeight;
                    });
                    x += rowWidth; w -= rowWidth;
                } else {
                    const rowHeight = rowArea / w;
                    let curX = x;
                    row.forEach(it => {
                        const itWidth = it.area / rowHeight;
                        result.push({ ...it, x: curX, y, w: itWidth, h: rowHeight });
                        curX += itWidth;
                    });
                    y += rowHeight; h -= rowHeight;
                }
                remaining = remaining.slice(row.length);
            }
            return result;
        }

        function renderCategoryChart() {
            const container = document.getElementById('chart-type');
            const palette = ['#1f7a3d', '#3fa562', '#7fcf99', '#d4a017', '#8e6fce', '#4f6d57', '#6b9bd1', '#c97b4a', '#5a8f6f', '#b08968', '#7a6ba0', '#4a90a4'];
            const entries = Object.entries(categoryValueMap).sort((a, b) => b[1] - a[1]);
            const total = entries.reduce((sum, [, v]) => sum + v, 0);

            if (total === 0) {
                container.innerHTML = '<div class="w-full h-full flex items-center justify-center text-xs text-gray-400">데이터 없음</div>';
                return;
            }

            const cw = container.clientWidth || 300;
            const ch = container.clientHeight || 250;
            const items = entries.map(([category, value], idx) => ({ category, value, area: value * (cw * ch / total), color: palette[idx % palette.length] }));
            const rects = squarify(items, 0, 0, cw, ch);

            container.innerHTML = rects.map(r => {
                const pct = (r.value / total) * 100;
                const isSelected = selectedCategories.has(r.category);
                const ring = isSelected ? 'box-shadow: inset 0 0 0 3px white, inset 0 0 0 5px #1f7a3d; z-index:2;' : '';
                const dim = (selectedCategories.size > 0 && !isSelected) ? 'opacity:0.45;' : '';
                const showFull = r.w > 60 && r.h > 40;
                let labelHtml = showFull 
                    ? `<span class="text-[11px] font-bold truncate w-full px-1">${r.category}</span><span class="text-[9px]">${pct.toFixed(1)}%</span><span class="text-[9px]">${formatMillion(r.value)}</span>` 
                    : (r.w > 30 && r.h > 20 ? `<span class="text-[9px] font-bold truncate px-0.5">${r.category}</span>` : '');

                return `<div onclick="toggleCategory('${r.category.replace(/'/g, "\\'")}')" class="absolute flex flex-col items-center justify-center text-white text-center cursor-pointer transition overflow-hidden border border-white/40" style="left:${r.x}px; top:${r.y}px; width:${r.w}px; height:${r.h}px; background-color:${r.color}; ${ring} ${dim}">${labelHtml}</div>`;
            }).join('');
        }

            const listEl = document.getElementById('recentLogsList');

                }

        function showMoreRecentLogs() {
            const listEl = document.getElementById('recentLogsList');
            const moreBtn = document.getElementById('recentLogsMoreBtn');
            const nextCount = Math.min(recentLogsShown + RECENT_LOGS_PAGE, recentLogsAll.length);
            const newItems = recentLogsAll.slice(recentLogsShown, nextCount);

            newItems.forEach(h => {
                const row = document.createElement('div');
                row.className = 'flex justify-between items-center py-3 text-xs';
                row.innerHTML = `
                    <div class="min-w-0 pr-2">
                        <p class="font-bold truncate">${h.partId} <span class="text-gray-400 font-normal">${h.partName || ''}</span></p>
                        <p class="text-gray-400 mt-0.5">${h.date ? new Date(h.date).toLocaleString('ko-KR') : '-'}</p>

                        <p class="text-gray-400 mt-0.5">재고 ${h.closingStock ?? '-'}</p>
                    </div>`;
                listEl.appendChild(row);
            });

            recentLogsShown = nextCount;
            if (recentLogsShown >= recentLogsAll.length) {
                moreBtn.classList.add('hidden');
            } else {
                moreBtn.classList.remove('hidden');
                moreBtn.textContent = `+ 20개 더 보기 (${recentLogsAll.length - recentLogsShown}개 남음)`;
            }
        }

        function copyPartId(partId) {
            const text = String(partId);
            if (navigator.clipboard && navigator.clipboard.writeText) {

                    showToast('품번이 복사되었습니다.', 'success');
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {

        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus(); ta.select();
            try {
                document.execCommand('copy');
                showToast('품번이 복사되었습니다.', 'success');
            } catch (e) {
                showToast('복사에 실패했습니다.', 'error');
            }
            document.body.removeChild(ta);
        }

        let currentQrItem = null;

        function openQrLabelModal(partId, partName) {
            currentQrItem = { partId, partName };
            document.getElementById('qrLabelPartId').textContent = partId;
            document.getElementById('qrLabelPartName').textContent = partName || '';
            const wrap = document.getElementById('qrLabelCanvasWrap');
            wrap.innerHTML = '';
            document.getElementById('qrLabelModal').classList.remove('hidden'); // 먼저 팝업부터 연다

            if (typeof QRCode === 'undefined') {
                wrap.innerHTML = '<p class="text-red-500 text-xs font-bold p-4">QR 라이브러리 로드 실패<br>(인터넷 연결을 확인하고 새로고침 해주세요)</p>';
                return;
            }
            try {
                new QRCode(wrap, { text: String(partId), width: 180, height: 180, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
            } catch (e) {
                wrap.innerHTML = `<p class="text-red-500 text-xs font-bold p-4">QR 생성 오류: ${e.message}</p>`;
                console.error(e);
            }
        }
        function closeQrLabelModal(evt) {
            if (evt && evt.target !== evt.currentTarget) return;
            document.getElementById('qrLabelModal').classList.add('hidden');
        }

        function printSingleQrLabel() {
            if (!currentQrItem) return;
            renderPrintLabels([currentQrItem]);
        }

        function printAllQrLabels() {
            if (typeof QRCode === 'undefined') { showToast('QR 라이브러리 로드 실패. 새로고침 후 다시 시도하세요.', 'error'); return; }
            // 현재 화면(검색/선택 필터)에 표시된 품목 기준으로 라벨 생성
            const searchInput = document.getElementById('searchInput');
            const searchKeyword = searchInput ? searchInput.value.trim().toLowerCase() : '';
            let targetData = masterData;
            if (!showAllItems && selectedCategories.size > 0) {
                targetData = masterData.filter(d => selectedCategories.has(d.category || '미분류'));
            }
            if (searchKeyword !== '') {
                targetData = targetData.filter(d =>
                    String(d.partId).toLowerCase().includes(searchKeyword) ||
                    String(d.partName).toLowerCase().includes(searchKeyword)
                );
            }
            if (targetData.length === 0) { showToast('인쇄할 품목이 없습니다.', 'error'); return; }
            if (targetData.length > 200 && !confirm(`${targetData.length}개 품목을 모두 인쇄하시겠습니까? 시간이 걸릴 수 있습니다.`)) return;
            renderPrintLabels(targetData.map(d => ({ partId: d.partId, partName: d.partName })));
        }

        function renderPrintLabels(list) {
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = '';
            list.forEach(item => {
                const labelDiv = document.createElement('div');
                labelDiv.className = 'qr-label';
                const qrWrap = document.createElement('div');
                labelDiv.appendChild(qrWrap);
                const idP = document.createElement('p');
                idP.className = 'part-id';
                idP.textContent = item.partId;
                const nameP = document.createElement('p');
                nameP.className = 'part-name';
                nameP.textContent = item.partName || '';
                labelDiv.appendChild(idP);
                labelDiv.appendChild(nameP);
                printArea.appendChild(labelDiv);
                new QRCode(qrWrap, { text: String(item.partId), width: 130, height: 130, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
            });
            setTimeout(() => window.print(), 400); // 렌더링(캔버스→이미지 변환) 여유시간 확보 후 인쇄
        }

        async function submitData(type) {
            const partId = document.getElementById('partId').value.trim();
            const qty = document.getElementById('qty').value.trim();
            if (!partId || !qty) { showToast('품번과 수량을 확인하세요.', 'error'); return; }

            // 출고 시 현재고를 초과하는지 사전 검증 (음수 재고 방지)
            if (type === '출고') {
                const d = masterData.find(item => String(item.partId) === String(partId));
                if (d) {
                    const currentStock = Number(d.stock) || 0;
                    const requestQty = Number(qty) || 0;
                    if (requestQty > currentStock) {
                        alert(`⚠️ 출고 불가\n\n품번: ${partId}\n품명: ${d.partName}\n현재고: ${currentStock}${d.unit || ''}\n요청 출고: ${requestQty}${d.unit || ''}\n\n현재고보다 많은 수량은 출고할 수 없습니다.`);
                        showToast(`출고 불가: 현재고(${currentStock}) 초과`, 'error');
                        return; // 서버로 전송하지 않고 중단
                    }
                }
            }

            const btnIn = document.getElementById('btn-in');
            const btnOut = document.getElementById('btn-out');
            const clickedBtn = type === '입고' ? btnIn : btnOut;

            // 처리 중 표시: 두 버튼 모두 비활성화 + 클릭한 버튼에 스피너 표시 (중복 제출 방지)
            btnIn.disabled = true; btnOut.disabled = true;
            clickedBtn.innerHTML = '<span class="inline-block w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin align-middle"></span> 처리 중...';

            const payload = { transactionId: 'TX-'+Date.now(), partId, qty, type, user: '영' };

            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.result === '성공') {
                    showToast(`${type} 처리 완료 (현재고: ${result.newStock})`, 'success');
                    document.getElementById('partId').value = ''; document.getElementById('qty').value = '';
                    document.getElementById('scanItemInfo').classList.add('hidden');
                    loadDashboard();
                } else showToast('오류: ' + result.error, 'error');
            } catch (err) {
                showToast('서버 통신 실패', 'error');
            } finally {
                // 성공/실패 관계없이 버튼 원상 복구
                btnIn.disabled = false; btnOut.disabled = false;
                btnIn.textContent = '입고'; btnOut.textContent = '출고';
            }
        }

        function downloadCsv() {
            if (masterData.length===0) return;
            const rows = masterData.map(d => [d.partId, d.partName, d.stock, d.category].join(',')).join('\n');
            const blob = new Blob(['\uFEFF품번,품명,현재고,기종\n' + rows], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = '재고.csv'; link.click();
        }
        function uploadCsv() { showToast('콘솔에서 미리보기를 확인하세요.', 'success'); }

        window.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
